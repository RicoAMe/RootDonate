<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Root Donate • Lost &amp; Found</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&amp;family=Playfair+Display:wght@700&amp;display=swap');
        
        body { 
            font-family: 'Inter', system_ui, sans-serif; 
        }
        .logo-font { 
            font-family: 'Playfair Display', Georgia, serif; 
            font-weight: 700; 
        }
        
        .report-card { 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
        }
        .report-card:hover { 
            transform: translateY(-8px); 
            box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.15); 
        }
        
        .modal { 
            animation: modalPop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); 
        }
        @keyframes modalPop { 
            from { 
                opacity: 0; 
                transform: scale(0.92) translateY(30px); 
            } 
            to { 
                opacity: 1; 
                transform: scale(1) translateY(0); 
            } 
        }
        
        .filter-btn {
            transition: all 0.2s ease;
        }
        .filter-btn.active {
            background-color: rgb(45 212 191);
            color: white;
            box-shadow: 0 10px 15px -3px rgb(45 212 191 / 0.3);
        }
        
        .line-clamp-3 {
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 min-h-screen">

    <!-- Navbar -->
    <nav class="bg-white dark:bg-slate-900 border-b border-slate-200 dark:border-slate-800 sticky top-0 z-50">
        <div class="max-w-screen-2xl mx-auto px-6 py-5 flex items-center justify-between">
            <div class="flex items-center gap-x-3">
                <div class="w-10 h-10 bg-teal-600 rounded-2xl flex items-center justify-center text-white text-3xl">
                    <i class="fa-solid fa-handshake"></i>
                </div>
                <div>
                    <span class="logo-font text-4xl font-bold tracking-tighter">Root</span>
                    <span class="logo-font text-4xl font-bold tracking-tighter text-teal-600">Donate</span>
                </div>
            </div>

            <div class="flex items-center gap-x-6">
                <button onclick="toggleDarkMode()" 
                        class="w-10 h-10 flex items-center justify-center rounded-2xl hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
                    <i id="theme-icon" class="fa-solid fa-moon text-xl"></i>
                </button>

                <button onclick="showLoginModal()" id="login-btn"
                        class="px-6 py-2.5 font-medium rounded-3xl border border-slate-300 dark:border-slate-700 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
                    Log in
                </button>

                <button onclick="showReportModal()" id="new-report-btn"
                        class="hidden px-6 py-3 bg-teal-600 hover:bg-teal-700 text-white font-semibold rounded-3xl flex items-center gap-x-2 transition-colors">
                    <i class="fa-solid fa-plus"></i>
                    <span>New Report</span>
                </button>

                <div onclick="showUserMenu()" id="profile-section" 
                     class="hidden items-center gap-x-3 cursor-pointer hover:opacity-80 transition-opacity">
                    <img id="nav-avatar" class="w-9 h-9 rounded-2xl object-cover ring-2 ring-teal-200" src="" alt="Profile">
                    <div>
                        <div id="nav-name" class="font-semibold text-sm"></div>
                        <div id="nav-handle" class="text-teal-600 text-xs"></div>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="max-w-screen-2xl mx-auto px-6 pt-10">
        <h1 class="text-5xl md:text-6xl font-bold tracking-tighter">Reuniting people with what matters.</h1>
        <p class="text-slate-600 dark:text-slate-400 mt-3 text-lg">Lost &amp; Found • UK • Verified Accounts</p>

        <!-- Filters -->
        <div class="mt-10 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-3xl p-2 flex flex-col md:flex-row gap-3">
            <div class="flex-1 relative">
                <i class="fa-solid fa-magnifying-glass absolute left-5 top-4 text-slate-400"></i>
                <input id="search-input" type="text" placeholder="Search reports, items, locations..." 
                       class="w-full pl-12 py-4 bg-slate-100 dark:bg-slate-800 rounded-3xl outline-none focus:ring-2 focus:ring-teal-500 transition-all"
                       onkeyup="if(event.key === 'Enter') filterReports()">
            </div>
            <div class="flex gap-2 flex-wrap">
                <button onclick="filterReports('all')" 
                        class="filter-btn active px-6 py-3 rounded-3xl text-sm font-medium">All</button>
                <button onclick="filterReports('lost')" 
                        class="filter-btn px-6 py-3 rounded-3xl text-sm font-medium">Lost</button>
                <button onclick="filterReports('found')" 
                        class="filter-btn px-6 py-3 rounded-3xl text-sm font-medium">Found</button>
                <button onclick="filterReports('money')" 
                        class="filter-btn px-6 py-3 rounded-3xl text-sm font-medium">💷 Money</button>
            </div>
        </div>

        <div id="reports-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 mt-8"></div>
    </div>

    <!-- Login / Register Modal -->
    <div id="auth-modal" class="hidden fixed inset-0 bg-black/70 backdrop-blur-xl z-[200] flex items-center justify-center p-4">
        <div onclick="event.stopImmediatePropagation()" 
             class="bg-white dark:bg-slate-900 w-full max-w-md rounded-3xl p-8 shadow-xl">
            
            <div class="flex justify-between items-center mb-6">
                <h2 id="auth-title" class="text-2xl font-semibold">Welcome back</h2>
                <button onclick="closeAuthModal()" 
                        class="text-3xl text-slate-400 hover:text-slate-600 dark:hover:text-slate-300 transition-colors">&times;</button>
            </div>

            <!-- Login Form -->
            <div id="login-form">
                <input id="login-email" type="email" placeholder="Email address" 
                       class="w-full px-5 py-4 rounded-2xl border border-slate-300 dark:border-slate-700 mb-3 focus:outline-none focus:border-teal-500">
                <input id="login-password" type="password" placeholder="Password" 
                       class="w-full px-5 py-4 rounded-2xl border border-slate-300 dark:border-slate-700 mb-6 focus:outline-none focus:border-teal-500">
                <button onclick="performLogin()" 
                        class="w-full py-4 bg-teal-600 hover:bg-teal-700 text-white font-semibold rounded-3xl transition-colors">
                    Log in
                </button>
                <p class="text-center text-sm text-slate-500 mt-6">
                    Don't have an account? 
                    <span onclick="switchToRegister()" class="text-teal-600 cursor-pointer hover:underline">Create one</span>
                </p>
            </div>

            <!-- Register Form -->
            <div id="register-form" class="hidden">
                <input id="reg-name" type="text" placeholder="Full name" 
                       class="w-full px-5 py-4 rounded-2xl border border-slate-300 dark:border-slate-700 mb-3 focus:outline-none focus:border-teal-500">
                <input id="reg-handle" type="text" placeholder="Username (e.g. @johnlondon)" 
                       class="w-full px-5 py-4 rounded-2xl border border-slate-300 dark:border-slate-700 mb-3 focus:outline-none focus:border-teal-500">
                <input id="reg-email" type="email" placeholder="Email address" 
                       class="w-full px-5 py-4 rounded-2xl border border-slate-300 dark:border-slate-700 mb-3 focus:outline-none focus:border-teal-500">
                <input id="reg-password" type="password" placeholder="Password" 
                       class="w-full px-5 py-4 rounded-2xl border border-slate-300 dark:border-slate-700 mb-6 focus:outline-none focus:border-teal-500">
                <button onclick="performRegister()" 
                        class="w-full py-4 bg-teal-600 hover:bg-teal-700 text-white font-semibold rounded-3xl transition-colors">
                    Create Account
                </button>
                <p class="text-center text-sm text-slate-500 mt-6">
                    Already have an account? 
                    <span onclick="switchToLogin()" class="text-teal-600 cursor-pointer hover:underline">Log in</span>
                </p>
            </div>
        </div>
    </div>

    <!-- Report Detail Modal -->
    <div id="detail-modal" class="hidden fixed inset-0 bg-black/70 backdrop-blur-xl z-[100] flex items-center justify-center p-4">
        <div onclick="event.stopImmediatePropagation()" 
             class="modal bg-white dark:bg-slate-900 w-full max-w-3xl rounded-3xl overflow-hidden shadow-2xl">
            
            <div class="px-8 py-6 border-b flex justify-between items-start">
                <div>
                    <div id="modal-status" class="inline-block px-5 py-1 text-xs font-bold rounded-3xl"></div>
                    <div id="modal-title" class="text-2xl font-semibold mt-2"></div>
                </div>
                <button onclick="closeModal()" 
                        class="text-4xl text-slate-400 hover:text-slate-600 dark:hover:text-slate-300 transition-colors">&times;</button>
            </div>
            
            <div class="p-8">
                <div id="modal-description" class="leading-relaxed text-slate-700 dark:text-slate-300"></div>
                
                <div class="mt-8 grid grid-cols-2 gap-8">
                    <div>
                        <div class="text-xs uppercase tracking-widest text-slate-500">Location</div>
                        <div id="modal-location" class="font-medium mt-1"></div>
                    </div>
                    <div>
                        <div class="text-xs uppercase tracking-widest text-slate-500">Posted</div>
                        <div id="modal-date" class="font-medium mt-1"></div>
                    </div>
                </div>

                <div class="mt-8 flex items-center gap-3">
                    <img id="modal-avatar" class="w-10 h-10 rounded-2xl object-cover" alt="">
                    <div>
                        <div id="modal-name" class="font-semibold"></div>
                        <div id="modal-handle" class="text-teal-600 text-sm"></div>
                    </div>
                </div>

                <div class="mt-10 pt-6 border-t">
                    <button onclick="copyShareLink()" 
                            class="flex items-center gap-2 text-sm font-medium px-5 py-3 bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 dark:hover:bg-slate-700 rounded-2xl transition-colors">
                        <i class="fa-solid fa-link"></i> 
                        Copy Share Link
                    </button>
                    <div id="share-url" 
                         class="mt-3 text-xs font-mono bg-slate-100 dark:bg-slate-800 p-4 rounded-2xl break-all"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // === DATA STORAGE ===
        let users = [];
        let reports = [];
        let currentUser = null;

        function loadData() {
            // Users
            if (localStorage.getItem('rootUsers')) {
                users = JSON.parse(localStorage.getItem('rootUsers'));
            } else {
                users = [
                    { 
                        id: 1, 
                        name: "Emily Thompson", 
                        handle: "@emily_london", 
                        email: "emily@rootdonate.co.uk", 
                        avatar: "https://picsum.photos/id/1005/128/128" 
                    }
                ];
                localStorage.setItem('rootUsers', JSON.stringify(users));
            }

            // Reports
            if (localStorage.getItem('rootReports')) {
                reports = JSON.parse(localStorage.getItem('rootReports'));
            } else {
                reports = [
                    { 
                        id: 174120001, 
                        type: "lost", 
                        category: "money", 
                        title: "Black leather wallet with cash", 
                        description: "Lost near Oxford Street. Contains £85 cash and several cards.", 
                        location: "Oxford Street, London", 
                        date: "2026-06-24", 
                        account: "@emily_london" 
                    },
                    { 
                        id: 174120002, 
                        type: "found", 
                        category: "item", 
                        title: "iPhone 15 Pro (Blue)", 
                        description: "Found at King's Cross Station. Still has 87% battery.", 
                        location: "King's Cross, London", 
                        date: "2026-06-25", 
                        account: "@emily_london" 
                    }
                ];
                localStorage.setItem('rootReports', JSON.stringify(reports));
            }
        }

        function saveData() {
            localStorage.setItem('rootUsers', JSON.stringify(users));
            localStorage.setItem('rootReports', JSON.stringify(reports));
        }

        // Render reports
        function renderReports(filtered = reports) {
            const grid = document.getElementById('reports-grid');
            grid.innerHTML = '';

            if (filtered.length === 0) {
                grid.innerHTML = `
                    <div class="col-span-full text-center py-20">
                        <i class="fa-solid fa-magnifying-glass text-5xl text-slate-300 dark:text-slate-700"></i>
                        <p class="mt-4 text-slate-500">No reports found.</p>
                    </div>
                `;
                return;
            }

            filtered.forEach(r => {
                const card = document.createElement('div');
                card.className = "report-card bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-3xl p-6 cursor-pointer";
                
                card.innerHTML = `
                    <div class="flex justify-between items-start">
                        <span class="px-4 py-1 text-xs font-bold rounded-3xl ${r.type === 'lost' ? 'bg-rose-100 text-rose-700 dark:bg-rose-950 dark:text-rose-300' : 'bg-emerald-100 text-emerald-700 dark:bg-emerald-950 dark:text-emerald-300'}">
                            ${r.type.toUpperCase()}
                        </span>
                        ${r.category === 'money' ? `<span class="px-4 py-1 text-xs font-bold bg-amber-100 text-amber-700 dark:bg-amber-950 dark:text-amber-300 rounded-3xl">💷 MONEY</span>` : ''}
                    </div>
                    <h3 class="font-semibold mt-4 text-lg">${r.title}</h3>
                    <p class="text-sm text-slate-600 dark:text-slate-400 line-clamp-3 mt-2">${r.description}</p>
                    <div class="mt-5 text-xs text-teal-600 font-medium">${r.account}</div>
                `;
                
                card.onclick = () => showDetailModal(r.id);
                grid.appendChild(card);
            });
        }

        function filterReports(type = 'all') {
            const term = document.getElementById('search-input').value.toLowerCase().trim();
            
            // Update active button
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.toggle('active', 
                    (type === 'all' && btn.textContent === 'All') ||
                    (type === 'lost' && btn.textContent === 'Lost') ||
                    (type === 'found' && btn.textContent === 'Found') ||
                    (type === 'money' && btn.textContent.includes('Money'))
                );
            });

            let filtered = reports;

            if (type !== 'all') {
                filtered = filtered.filter(r => 
                    type === 'money' ? r.category === 'money' : r.type === type
                );
            }

            if (term) {
                filtered = filtered.filter(r => 
                    r.title.toLowerCase().includes(term) || 
                    r.description.toLowerCase().includes(term) ||
                    r.location.toLowerCase().includes(term)
                );
            }

            renderReports(filtered);
        }

        // === AUTHENTICATION ===
        function showLoginModal() {
            const modal = document.getElementById('auth-modal');
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            switchToLogin();
        }

        function closeAuthModal() {
            const modal = document.getElementById('auth-modal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
        }

        function switchToRegister() {
            document.getElementById('login-form').classList.add('hidden');
            document.getElementById('register-form').classList.remove('hidden');
            document.getElementById('auth-title').textContent = "Create account";
        }

        function switchToLogin() {
            document.getElementById('register-form').classList.add('hidden');
            document.getElementById('login-form').classList.remove('hidden');
            document.getElementById('auth-title').textContent = "Welcome back";
        }

        function performLogin() {
            const email = document.getElementById('login-email').value.trim();
            if (!email) {
                showToast("Please enter your email");
                return;
            }

            const user = users.find(u => u.email === email);
            
            if (user) {
                currentUser = user;
                updateUIAfterLogin();
                closeAuthModal();
                showToast(`Welcome back, ${user.name.split(' ')[0]}!`);
            } else {
                showToast("Account not found. Try registering.");
            }
        }

        function performRegister() {
            const name = document.getElementById('reg-name').value.trim();
            const handle = document.getElementById('reg-handle').value.trim();
            const email = document.getElementById('reg-email').value.trim();

            if (!name || !handle || !email) {
                showToast("Please fill all fields");
                return;
            }

            if (users.find(u => u.email === email)) {
                showToast("Email already registered");
                return;
            }

            const newUser = {
                id: Date.now(),
                name: name,
                handle: handle.startsWith('@') ? handle : '@' + handle,
                email: email,
                avatar: `https://picsum.photos/id/${Math.floor(Math.random() * 1000)}/128/128`
            };

            users.push(newUser);
            saveData();

            currentUser = newUser;
            updateUIAfterLogin();
            closeAuthModal();
            showToast(`Account created! Welcome, ${name.split(' ')[0]}`);
        }

        function updateUIAfterLogin() {
            document.getElementById('login-btn').classList.add('hidden');
            document.getElementById('new-report-btn').classList.remove('hidden');
            document.getElementById('profile-section').classList.remove('hidden');

            document.getElementById('nav-avatar').src = currentUser.avatar;
            document.getElementById('nav-name').textContent = currentUser.name;
            document.getElementById('nav-handle').textContent = currentUser.handle;
        }

        function showUserMenu() {
            if (confirm("Log out?")) {
                currentUser = null;
                document.getElementById('login-btn').classList.remove('hidden');
                document.getElementById('new-report-btn').classList.add('hidden');
                document.getElementById('profile-section').classList.add('hidden');
                showToast("Logged out successfully");
            }
        }

        function showReportModal() {
            if (!currentUser) {
                showToast("Please log in to create a report");
                showLoginModal();
                return;
            }
            alert(`New Report Form for ${currentUser.handle}\n\n(Extend this with a full form in future updates)`);
        }

        function showDetailModal(id) {
            const report = reports.find(r => r.id === id);
            if (!report) return;

            document.getElementById('modal-title').textContent = report.title;
            document.getElementById('modal-description').textContent = report.description;
            document.getElementById('modal-location').textContent = report.location;
            document.getElementById('modal-date').textContent = report.date;

            const user = users.find(u => u.handle === report.account) || 
                        { name: "Unknown User", handle: report.account, avatar: "https://picsum.photos/id/1005/128/128" };

            document.getElementById('modal-avatar').src = user.avatar;
            document.getElementById('modal-name').textContent = user.name;
            document.getElementById('modal-handle').textContent = user.handle;

            const statusEl = document.getElementById('modal-status');
            statusEl.textContent = report.type.toUpperCase();
            statusEl.className = `inline-block px-5 py-1 text-xs font-bold rounded-3xl ${report.type === 'lost' ? 'bg-rose-100 text-rose-700' : 'bg-emerald-100 text-emerald-700'}`;

            const shareUrl = `https://rootdonate.co.uk/report/${report.id}`;
            document.getElementById('share-url').textContent = shareUrl;

            const modal = document.getElementById('detail-modal');
            modal.classList.remove('hidden');
            modal.classList.add('flex');
        }

        function copyShareLink() {
            const url = document.getElementById('share-url').textContent;
            navigator.clipboard.writeText(url).then(() => {
                showToast("✅ Share link copied to clipboard!");
            });
        }

        function closeModal() {
            const modal = document.getElementById('detail-modal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
        }

        function toggleDarkMode() {
            document.documentElement.classList.toggle('dark');
            const icon = document.getElementById('theme-icon');
            if (icon.classList.contains('fa-moon')) {
                icon.classList.remove('fa-moon');
                icon.classList.add('fa-sun');
            } else {
                icon.classList.remove('fa-sun');
                icon.classList.add('fa-moon');
            }
        }

        function showToast(msg) {
            const toast = document.createElement('div');
            toast.style.cssText = `
                position:fixed; 
                bottom:24px; 
                right:24px; 
                background:#111827; 
                color:white; 
                padding:16px 24px; 
                border-radius:9999px; 
                box-shadow:0 10px 15px -3px rgb(0 0 0 / 0.3); 
                z-index:9999; 
                display:flex; 
                align-items:center; 
                gap:12px;
                animation: slideUp 0.3s ease;
            `;
            toast.innerHTML = `<i class="fa-solid fa-check-circle text-teal-400"></i> ${msg}`;
            document.body.appendChild(toast);
            
            setTimeout(() => {
                toast.style.transition = 'all 0.3s ease';
                toast.style.opacity = '0';
                toast.style.transform = 'translateY(20px)';
                setTimeout(() => toast.remove(), 300);
            }, 2800);
        }

        // Initialize
        window.onload = () => {
            loadData();
            renderReports();
            console.log('%c✅ Root Donate ready • Lost & Found platform', 'color:#14b8a6; font-weight:600; font-size:13px');
        };
    </script>
</body>
</html>
