<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Root Donate • Lost &amp; Found</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&amp;family=Playfair+Display:wght@700&amp;display=swap');
        
        body { font-family: 'Inter', system_ui, sans-serif; }
        .logo-font { font-family: 'Playfair Display', Georgia, serif; font-weight: 700; }
        
        .report-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .report-card:hover { transform: translateY(-8px); box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.15); }
        
        .modal { animation: modalPop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); }
        @keyframes modalPop { 
            from { opacity: 0; transform: scale(0.92) translateY(30px); } 
            to { opacity: 1; transform: scale(1) translateY(0); } 
        }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 min-h-screen">

    <!-- Navbar -->
    <nav class="bg-white dark:bg-slate-900 border-b border-slate-200 dark:border-slate-800 sticky top-0 z-50">
        <div class="max-w-screen-2xl mx-auto px-6 py-5 flex items-center justify-between">
            <div class="flex items-center gap-x-3">
                <div class="w-10 h-10 bg-teal-600 rounded-2xl flex items-center justify-center text-white text-3xl">
                    <i class="fa-solid fa-handshake"></i>
                </div>
                <div>
                    <span class="logo-font text-4xl font-bold tracking-tighter">Root</span>
                    <span class="logo-font text-4xl font-bold tracking-tighter text-teal-600">Donate</span>
                </div>
            </div>

            <div class="flex items-center gap-x-6">
                <button onclick="toggleDarkMode()" class="w-10 h-10 flex items-center justify-center rounded-2xl hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
                    <i id="theme-icon" class="fa-solid fa-moon text-xl"></i>
                </button>

                <button onclick="showLoginModal()" id="login-btn"
                        class="px-6 py-2.5 font-medium rounded-3xl border border-slate-300 dark:border-slate-700 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
                    Log in
                </button>

                <button onclick="showNewReportModal()" id="new-report-btn"
                        class="hidden px-6 py-3 bg-teal-600 hover:bg-teal-700 text-white font-semibold rounded-3xl flex items-center gap-x-2 transition-colors">
                    <i class="fa-solid fa-plus"></i>
                    <span>New Report</span>
                </button>

                <div onclick="showUserMenu()" id="profile-section" 
                     class="hidden items-center gap-x-3 cursor-pointer hover:opacity-80 transition-opacity">
                    <img id="nav-avatar" class="w-9 h-9 rounded-2xl object-cover ring-2 ring-teal-200" src="" alt="Profile">
                    <div>
                        <div id="nav-name" class="font-semibold text-sm"></div>
                        <div id="nav-handle" class="text-teal-600 text-xs"></div>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="max-w-screen-2xl mx-auto px-6 pt-10">
        <h1 class="text-5xl md:text-6xl font-bold tracking-tighter">Reuniting people with what matters.</h1>
        <p class="text-slate-600 dark:text-slate-400 mt-3 text-lg">Lost &amp; Found • UK • Verified Accounts</p>

        <!-- Filters -->
        <div class="mt-10 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-3xl p-2 flex flex-col md:flex-row gap-3">
            <div class="flex-1 relative">
                <i class="fa-solid fa-magnifying-glass absolute left-5 top-4 text-slate-400"></i>
                <input id="search-input" type="text" placeholder="Search reports, items, locations..." 
                       class="w-full pl-12 py-4 bg-slate-100 dark:bg-slate-800 rounded-3xl outline-none focus:ring-2 focus:ring-teal-500 transition-all"
                       onkeyup="if(event.key === 'Enter') filterReports()">
            </div>
            <div class="flex gap-2 flex-wrap">
                <button onclick="filterReports('all')" class="filter-btn active px-6 py-3 rounded-3xl text-sm font-medium">All</button>
                <button onclick="filterReports('lost')" class="filter-btn px-6 py-3 rounded-3xl text-sm font-medium">Lost</button>
                <button onclick="filterReports('found')" class="filter-btn px-6 py-3 rounded-3xl text-sm font-medium">Found</button>
                <button onclick="filterReports('money')" class="filter-btn px-6 py-3 rounded-3xl text-sm font-medium">💷 Money</button>
            </div>
        </div>

        <div id="reports-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 mt-8"></div>
    </div>

    <!-- New Report Modal -->
    <div id="new-report-modal" class="hidden fixed inset-0 bg-black/70 backdrop-blur-xl z-[200] flex items-center justify-center p-4">
        <div onclick="event.stopImmediatePropagation()" 
             class="modal bg-white dark:bg-slate-900 w-full max-w-lg rounded-3xl p-8 shadow-2xl max-h-[90vh] overflow-auto">
            
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-semibold">Create New Report</h2>
                <button onclick="closeNewReportModal()" class="text-4xl text-slate-400 hover:text-slate-600 dark:hover:text-slate-300">&times;</button>
            </div>

            <form id="new-report-form" onsubmit="submitNewReport(event)">
                <div class="space-y-5">
                    <div>
                        <label class="block text-sm font-medium mb-2">Type</label>
                        <div class="flex gap-3">
                            <button type="button" onclick="selectType(this)" data-type="lost"
                                    class="type-btn flex-1 py-4 rounded-2xl border-2 border-rose-300 text-rose-700 dark:border-rose-800 font-semibold active">
                                LOST
                            </button>
                            <button type="button" onclick="selectType(this)" data-type="found"
                                    class="type-btn flex-1 py-4 rounded-2xl border-2 border-emerald-300 text-emerald-700 dark:border-emerald-800 font-semibold">
                                FOUND
                            </button>
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-medium mb-2">Title</label>
                        <input id="report-title" type="text" required
                               class="w-full px-5 py-4 rounded-2xl border border-slate-300 dark:border-slate-700 focus:outline-none focus:border-teal-500"
                               placeholder="e.g. Black leather wallet with cash">
                    </div>

                    <div>
                        <label class="block text-sm font-medium mb-2">Description</label>
                        <textarea id="report-desc" rows="4" required
                                  class="w-full px-5 py-4 rounded-2xl border border-slate-300 dark:border-slate-700 focus:outline-none focus:border-teal-500"
                                  placeholder="Details about the item..."></textarea>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium mb-2">Location</label>
                            <input id="report-location" type="text" required
                                   class="w-full px-5 py-4 rounded-2xl border border-slate-300 dark:border-slate-700 focus:outline-none focus:border-teal-500"
                                   placeholder="Oxford Street, London">
                        </div>
                        <div>
                            <label class="block text-sm font-medium mb-2">Category</label>
                            <select id="report-category" required
                                    class="w-full px-5 py-4 rounded-2xl border border-slate-300 dark:border-slate-700 focus:outline-none focus:border-teal-500">
                                <option value="item">General Item</option>
                                <option value="money">Money / Wallet</option>
                                <option value="phone">Phone / Electronics</option>
                                <option value="bag">Bag / Backpack</option>
                                <option value="other">Other</option>
                            </select>
                        </div>
                    </div>

                    <button type="submit"
                            class="w-full py-4 bg-teal-600 hover:bg-teal-700 text-white font-semibold rounded-3xl transition-colors">
                        Post Report
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Existing Modals (Login, Detail) remain the same -->
    <!-- ... (Login modal and Detail modal from your original code) ... -->

    <script>
        // === DATA STORAGE ===
        let users = [];
        let reports = [];
        let currentUser = null;

        function loadData() { /* ... same as before ... */ }
        function saveData() { /* ... same as before ... */ }

        // Render reports (unchanged)
        function renderReports(filtered = reports) { /* ... same as before ... */ }
        function filterReports(type = 'all') { /* ... same as before ... */ }

        // === NEW REPORT MODAL ===
        let selectedType = 'lost';

        function showNewReportModal() {
            if (!currentUser) {
                showToast("Please log in to create a report");
                showLoginModal();
                return;
            }
            document.getElementById('new-report-modal').classList.remove('hidden');
            document.getElementById('new-report-modal').classList.add('flex');
            // Reset form
            document.getElementById('new-report-form').reset();
            selectType(document.querySelector('.type-btn[data-type="lost"]'));
        }

        function closeNewReportModal() {
            const modal = document.getElementById('new-report-modal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
        }

        function selectType(btn) {
            document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active', 'border-teal-500'));
            btn.classList.add('active', 'border-teal-500');
            selectedType = btn.dataset.type;
        }

        function submitNewReport(e) {
            e.preventDefault();

            const newReport = {
                id: Date.now(),
                type: selectedType,
                category: document.getElementById('report-category').value,
                title: document.getElementById('report-title').value,
                description: document.getElementById('report-desc').value,
                location: document.getElementById('report-location').value,
                date: new Date().toISOString().split('T')[0],
                account: currentUser.handle
            };

            reports.unshift(newReport); // Add to top
            saveData();
            renderReports();
            closeNewReportModal();
            
            showToast("✅ Report posted successfully!");
        }

        // === AUTH & DETAIL MODALS (unchanged) ===
        // Paste your original login, register, detail modal functions here...

        function showDetailModal(id) {
            const report = reports.find(r => r.id === id);
            if (!report) return;

            // ... your existing code ...

            const shareUrl = `https://rootdonate.co.uk/report/${report.id}`;
            document.getElementById('share-url').textContent = shareUrl;
            document.getElementById('share-url').dataset.url = shareUrl; // for copying
        }

        function copyShareLink() {
            const url = document.getElementById('share-url').dataset.url || document.getElementById('share-url').textContent;
            navigator.clipboard.writeText(url).then(() => {
                showToast("✅ Share link copied!");
            });
        }

        // Initialize
        window.onload = () => {
            loadData();
            renderReports();
            console.log('%c✅ Root Donate ready • Lost & Found platform', 'color:#14b8a6; font-weight:600; font-size:13px');
        };
    </script>
</body>
</html>
