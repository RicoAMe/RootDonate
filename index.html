<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Root Donate • Lost & Found</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&amp;family=Playfair+Display:wght@700&amp;display=swap');
        body { font-family: 'Inter', system_ui, sans-serif; }
        .logo-font { font-family: 'Playfair Display', Georgia, serif; font-weight: 700; }
        .report-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .report-card:hover { transform: translateY(-8px); box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.15); }
        .modal { animation: modalPop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); }
        @keyframes modalPop { from { opacity: 0; transform: scale(0.92) translateY(30px); } to { opacity: 1; transform: scale(1) translateY(0); } }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 min-h-screen">

    <!-- Navbar -->
    <nav class="bg-white dark:bg-slate-900 border-b border-slate-200 dark:border-slate-800 sticky top-0 z-50">
        <div class="max-w-screen-2xl mx-auto px-6 py-5 flex items-center justify-between">
            <div class="flex items-center gap-x-3">
                <div class="w-10 h-10 bg-teal-600 rounded-2xl flex items-center justify-center text-white text-3xl">
                    <i class="fa-solid fa-handshake"></i>
                </div>
                <div>
                    <span class="logo-font text-4xl font-bold tracking-tighter">Root</span>
                    <span class="logo-font text-4xl font-bold tracking-tighter text-teal-600">Donate</span>
                </div>
            </div>

            <div class="flex items-center gap-x-6">
                <button onclick="toggleDarkMode()" class="w-10 h-10 flex items-center justify-center rounded-2xl hover:bg-slate-100 dark:hover:bg-slate-800">
                    <i id="theme-icon" class="fa-solid fa-moon text-xl"></i>
                </button>

                <button onclick="showLoginModal()" id="login-btn"
                        class="px-6 py-2.5 font-medium rounded-3xl border border-slate-300 dark:border-slate-700 hover:bg-slate-100 dark:hover:bg-slate-800">
                    Log in
                </button>

                <button onclick="showReportModal()" id="new-report-btn"
                        class="hidden px-6 py-3 bg-teal-600 hover:bg-teal-700 text-white font-semibold rounded-3xl flex items-center gap-x-2">
                    <i class="fa-solid fa-plus"></i>
                    <span>New Report</span>
                </button>

                <div onclick="showUserMenu()" id="profile-section" class="hidden items-center gap-x-3 cursor-pointer">
                    <img id="nav-avatar" class="w-9 h-9 rounded-2xl object-cover ring-2 ring-teal-200" src="">
                    <div>
                        <div id="nav-name" class="font-semibold text-sm"></div>
                        <div id="nav-handle" class="text-emerald-600 text-xs"></div>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="max-w-screen-2xl mx-auto px-6 pt-10">
        <h1 class="text-5xl md:text-6xl font-bold tracking-tighter">Reuniting people with what matters.</h1>
        <p class="text-slate-600 dark:text-slate-400 mt-2">Lost &amp; Found • UK • Verified Accounts</p>

        <!-- Filters -->
        <div class="mt-10 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-3xl p-2 flex flex-col md:flex-row gap-3">
            <div class="flex-1 relative">
                <i class="fa-solid fa-magnifying-glass absolute left-5 top-4 text-slate-400"></i>
                <input id="search-input" type="text" placeholder="Search reports, items, locations..." 
                       class="w-full pl-12 py-4 bg-slate-100 dark:bg-slate-800 rounded-3xl outline-none"
                       onkeyup="filterReports()">
            </div>
            <div class="flex gap-2">
                <button onclick="filterReports('all')" class="filter-btn active px-6 py-3 rounded-3xl text-sm">All</button>
                <button onclick="filterReports('lost')" class="filter-btn px-6 py-3 rounded-3xl text-sm">Lost</button>
                <button onclick="filterReports('found')" class="filter-btn px-6 py-3 rounded-3xl text-sm">Found</button>
                <button onclick="filterReports('money')" class="filter-btn px-6 py-3 rounded-3xl text-sm">💷 Money</button>
            </div>
        </div>

        <div id="reports-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 mt-8"></div>
    </div>

    <!-- Login / Register Modal -->
    <div id="auth-modal" class="hidden fixed inset-0 bg-black/70 backdrop-blur-xl z-[200] flex items-center justify-center p-4">
        <div onclick="event.stopImmediatePropagation()" class="bg-white dark:bg-slate-900 w-full max-w-md rounded-3xl p-8">
            <div class="flex justify-between items-center mb-6">
                <h2 id="auth-title" class="text-2xl font-semibold">Welcome back</h2>
                <button onclick="closeAuthModal()" class="text-3xl text-slate-400">&times;</button>
            </div>

            <!-- Login Form -->
            <div id="login-form">
                <input id="login-email" type="email" placeholder="Email address" class="w-full px-5 py-4 rounded-2xl border border-slate-300 dark:border-slate-700 mb-3">
                <input id="login-password" type="password" placeholder="Password" class="w-full px-5 py-4 rounded-2xl border border-slate-300 dark:border-slate-700 mb-6">
                <button onclick="performLogin()" class="w-full py-4 bg-teal-600 text-white font-semibold rounded-3xl">Log in</button>
                <p class="text-center text-sm text-slate-500 mt-6">
                    Don't have an account? 
                    <span onclick="switchToRegister()" class="text-teal-600 cursor-pointer hover:underline">Create one</span>
                </p>
            </div>

            <!-- Register Form -->
            <div id="register-form" class="hidden">
                <input id="reg-name" type="text" placeholder="Full name" class="w-full px-5 py-4 rounded-2xl border border-slate-300 dark:border-slate-700 mb-3">
                <input id="reg-handle" type="text" placeholder="Username (e.g. @johnlondon)" class="w-full px-5 py-4 rounded-2xl border border-slate-300 dark:border-slate-700 mb-3">
                <input id="reg-email" type="email" placeholder="Email address" class="w-full px-5 py-4 rounded-2xl border border-slate-300 dark:border-slate-700 mb-3">
                <input id="reg-password" type="password" placeholder="Password" class="w-full px-5 py-4 rounded-2xl border border-slate-300 dark:border-slate-700 mb-6">
                <button onclick="performRegister()" class="w-full py-4 bg-teal-600 text-white font-semibold rounded-3xl">Create Account</button>
                <p class="text-center text-sm text-slate-500 mt-6">
                    Already have an account? 
                    <span onclick="switchToLogin()" class="text-teal-600 cursor-pointer hover:underline">Log in</span>
                </p>
            </div>
        </div>
    </div>

    <!-- Report Detail Modal (with share link) -->
    <div id="detail-modal" class="hidden fixed inset-0 bg-black/70 backdrop-blur-xl z-[100] flex items-center justify-center p-4">
        <div onclick="event.stopImmediatePropagation()" class="modal bg-white dark:bg-slate-900 w-full max-w-3xl rounded-3xl overflow-hidden">
            <div class="px-8 py-6 border-b flex justify-between">
                <div>
                    <div id="modal-status" class="inline-block px-5 py-1 text-xs font-bold rounded-3xl"></div>
                    <div id="modal-title" class="text-2xl font-semibold mt-2"></div>
                </div>
                <button onclick="closeModal()" class="text-4xl text-slate-400">&times;</button>
            </div>
            <div class="p-8">
                <div id="modal-description" class="leading-relaxed"></div>
                
                <div class="mt-8 flex gap-8">
                    <div>
                        <div class="text-xs uppercase text-slate-500">Location</div>
                        <div id="modal-location" class="font-medium"></div>
                    </div>
                    <div>
                        <div class="text-xs uppercase text-slate-500">Posted</div>
                        <div id="modal-date" class="font-medium"></div>
                    </div>
                </div>

                <div class="mt-8 flex items-center gap-3">
                    <img id="modal-avatar" class="w-10 h-10 rounded-2xl">
                    <div>
                        <div id="modal-name" class="font-semibold"></div>
                        <div id="modal-handle" class="text-emerald-600"></div>
                    </div>
                </div>

                <div class="mt-10 pt-6 border-t">
                    <button onclick="copyShareLink()" class="flex items-center gap-2 text-sm font-medium px-5 py-3 bg-slate-100 dark:bg-slate-800 rounded-2xl">
                        <i class="fa-solid fa-link"></i> Copy Share Link
                    </button>
                    <div id="share-url" class="mt-3 text-xs font-mono bg-slate-100 dark:bg-slate-800 p-4 rounded-2xl break-all"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // === DATA STORAGE ===
        let users = [];
        let reports = [];
        let currentUser = null;

        function loadData() {
            // Users
            if (localStorage.getItem('rootUsers')) {
                users = JSON.parse(localStorage.getItem('rootUsers'));
            } else {
                users = [
                    { id: 1, name: "Emily Thompson", handle: "@emily_london", email: "emily@rootdonate.co.uk", avatar: "https://picsum.photos/id/1005/128/128" }
                ];
                localStorage.setItem('rootUsers', JSON.stringify(users));
            }

            // Reports
            if (localStorage.getItem('rootReports')) {
                reports = JSON.parse(localStorage.getItem('rootReports'));
            } else {
                reports = [
                    { id: 174120001, type: "lost", category: "money", title: "Black leather wallet with cash", description: "Lost near Oxford Street. Contains £85 cash.", location: "Oxford Street, London", date: "2026-06-24", account: "@emily_london" },
                    { id: 174120002, type: "found", category: "item", title: "iPhone 15 Pro (Blue)", description: "Found at King's Cross Station.", location: "King's Cross, London", date: "2026-06-25", account: "@emily_london" }
                ];
                localStorage.setItem('rootReports', JSON.stringify(reports));
            }
        }

        function saveData() {
            localStorage.setItem('rootUsers', JSON.stringify(users));
            localStorage.setItem('rootReports', JSON.stringify(reports));
        }

        // Render reports
        function renderReports(filtered = reports) {
            const grid = document.getElementById('reports-grid');
            grid.innerHTML = '';

            filtered.forEach(r => {
                const card = document.createElement('div');
                card.className = "report-card bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-3xl p-6 cursor-pointer";
                card.innerHTML = `
                    <div class="flex justify-between">
                        <span class="px-4 py-1 text-xs font-bold rounded-3xl ${r.type === 'lost' ? 'bg-rose-100 text-rose-700' : 'bg-emerald-100 text-emerald-700'}">
                            ${r.type.toUpperCase()}
                        </span>
                        ${r.category === 'money' ? `<span class="px-4 py-1 text-xs font-bold bg-amber-100 text-amber-700 rounded-3xl">💷 MONEY</span>` : ''}
                    </div>
                    <h3 class="font-semibold mt-4">${r.title}</h3>
                    <p class="text-sm text-slate-600 dark:text-slate-400 line-clamp-3 mt-2">${r.description}</p>
                    <div class="mt-5 text-xs text-emerald-600">${r.account}</div>
                `;
                card.onclick = () => showDetailModal(r.id);
                grid.appendChild(card);
            });
        }

        function filterReports(type = 'all') {
            const term = document.getElementById('search-input').value.toLowerCase();
            let filtered = reports;

            if (type !== 'all') {
                filtered = filtered.filter(r => type === 'money' ? r.category === 'money' : r.type === type);
            }
            if (term) {
                filtered = filtered.filter(r => r.title.toLowerCase().includes(term) || r.description.toLowerCase().includes(term));
            }
            renderReports(filtered);
        }

        // === AUTHENTICATION ===
        function showLoginModal() {
            document.getElementById('auth-modal').classList.remove('hidden');
            document.getElementById('auth-modal').classList.add('flex');
            switchToLogin();
        }

        function closeAuthModal() {
            document.getElementById('auth-modal').classList.add('hidden');
            document.getElementById('auth-modal').classList.remove('flex');
        }

        function switchToRegister() {
            document.getElementById('login-form').classList.add('hidden');
            document.getElementById('register-form').classList.remove('hidden');
            document.getElementById('auth-title').textContent = "Create account";
        }

        function switchToLogin() {
            document.getElementById('register-form').classList.add('hidden');
            document.getElementById('login-form').classList.remove('hidden');
            document.getElementById('auth-title').textContent = "Welcome back";
        }

        function performLogin() {
            const email = document.getElementById('login-email').value.trim();
            const user = users.find(u => u.email === email);
            
            if (user) {
                currentUser = user;
                updateUIAfterLogin();
                closeAuthModal();
                showToast(`Welcome back, ${user.name}!`);
            } else {
                showToast("Account not found. Try registering.");
            }
        }

        function performRegister() {
            const name = document.getElementById('reg-name').value.trim();
            const handle = document.getElementById('reg-handle').value.trim();
            const email = document.getElementById('reg-email').value.trim();

            if (!name || !handle || !email) {
                showToast("Please fill all fields");
                return;
            }

            if (users.find(u => u.email === email)) {
                showToast("Email already registered");
                return;
            }

            const newUser = {
                id: Date.now(),
                name: name,
                handle: handle.startsWith('@') ? handle : '@' + handle,
                email: email,
                avatar: `https://picsum.photos/id/${Math.floor(Math.random()*1000)}/128/128`
            };

            users.push(newUser);
            saveData();

            currentUser = newUser;
            updateUIAfterLogin();
            closeAuthModal();
            showToast(`Account created successfully! Welcome, ${name}`);
        }

        function updateUIAfterLogin() {
            document.getElementById('login-btn').classList.add('hidden');
            document.getElementById('new-report-btn').classList.remove('hidden');
            document.getElementById('profile-section').classList.remove('hidden');

            document.getElementById('nav-avatar').src = currentUser.avatar;
            document.getElementById('nav-name').textContent = currentUser.name;
            document.getElementById('nav-handle').textContent = currentUser.handle;
        }

        function showUserMenu() {
            if (confirm("Logout?")) {
                currentUser = null;
                document.getElementById('login-btn').classList.remove('hidden');
                document.getElementById('new-report-btn').classList.add('hidden');
                document.getElementById('profile-section').classList.add('hidden');
                showToast("Logged out successfully");
            }
        }

        function showReportModal() {
            if (!currentUser) {
                showToast("Please log in to create a report");
                showLoginModal();
                return;
            }
            alert(`New Report Form opened as ${currentUser.handle}\n\n(You can extend this with full form like before)`);
        }

        function showDetailModal(id) {
            const report = reports.find(r => r.id === id);
            if (!report) return;

            document.getElementById('modal-title').textContent = report.title;
            document.getElementById('modal-description').textContent = report.description;
            document.getElementById('modal-location').textContent = report.location;
            document.getElementById('modal-date').textContent = report.date;

            const user = users.find(u => u.handle === report.account) || currentUser || { name: "Unknown", handle: report.account, avatar: "https://picsum.photos/id/1005/128/128" };

            document.getElementById('modal-avatar').src = user.avatar;
            document.getElementById('modal-name').textContent = user.name;
            document.getElementById('modal-handle').textContent = user.handle;

            const shareUrl = `https://rootdonate.co.uk/report/${report.id}`;
            document.getElementById('share-url').textContent = shareUrl;

            document.getElementById('detail-modal').classList.remove('hidden');
            document.getElementById('detail-modal').classList.add('flex');
        }

        function copyShareLink() {
            const url = document.getElementById('share-url').textContent;
            navigator.clipboard.writeText(url);
            showToast("✅ Share link copied!");
        }

        function closeModal() {
            document.getElementById('detail-modal').classList.add('hidden');
            document.getElementById('detail-modal').classList.remove('flex');
        }

        function toggleDarkMode() {
            document.documentElement.classList.toggle('dark');
            const icon = document.getElementById('theme-icon');
            icon.classList.toggle('fa-moon');
            icon.classList.toggle('fa-sun');
        }

        function showToast(msg) {
            const t = document.createElement('div');
            t.style.cssText = "position:fixed;bottom:24px;right:24px;background:#111827;color:white;padding:16px 24px;border-radius:9999px;box-shadow:0 10px 15px -3px rgb(0 0 0 / 0.3);z-index:9999;display:flex;align-items:center;gap:12px;";
            t.innerHTML = `<i class="fa-solid fa-check-circle text-teal-400"></i> ${msg}`;
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 3000);
        }

        // Initialize
        window.onload = () => {
            loadData();
            renderReports();
            console.log('%c✅ Root Donate - Login + Real Accounts Ready', 'color:#14b8a6; font-weight:600');
        };
    </script>
</body>
</html>
