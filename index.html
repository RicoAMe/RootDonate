 <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Node Monitor - Forced Online</title>
  <style>
    body { font-family: Arial, sans-serif; background: #000; color: #00ff00; margin: 0; padding: 20px; }
    .container { max-width: 1000px; margin: auto; }
    h1 { text-align: center; }
    .node { background: #111; padding: 20px; margin: 15px 0; border-radius: 10px; border: 2px solid #00ff00; }
    .status { font-size: 1.3em; font-weight: bold; color: lime; }
    .log { background: #0a0a0a; padding: 20px; height: 400px; overflow-y: auto; font-family: monospace; border: 1px solid #00ff00; }
    button { padding: 12px 30px; margin: 10px; font-size: 16px; background: #00ff00; color: black; border: none; border-radius: 6px; cursor: pointer; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔄 NODE MONITOR (Forced Online Mode)</h1>
    <p style="text-align:center; color:#0f0;">✅ All nodes forced to ONLINE for demonstration</p>

    <div class="node">
      <h2>@CWOA</h2>
      <div class="status">🟢 ONLINE - 192.168.0.1</div>
    </div>
    <div class="node">
      <h2>@HarrisFed</h2>
      <div class="status">🟢 ONLINE - 192.168.0.1</div>
    </div>
    <div class="node">
      <h2>Colossus</h2>
      <div class="status">🟢 ONLINE - 192.168.0.1</div>
    </div>

    <div style="text-align:center;">
      <button onclick="startFakeScan()">▶ Start Simulated Auto Scan</button>
    </div>

    <h2>Live Log</h2>
    <div id="log" class="log"></div>
  </div>

  <script>
    function log(msg) {
      const time = new Date().toLocaleTimeString();
      document.getElementById("log").innerHTML += `[${time}] ${msg}<br>`;
      document.getElementById("log").scrollTop = 99999;
    }

    function startFakeScan() {
      log("🚀 Starting simulated scan...");
      setInterval(() => {
        log("✅ @CWOA → ONLINE 🟢 (12ms)");
        log("✅ @HarrisFed → ONLINE 🟢 (8ms)");
        log("✅ Colossus → ONLINE 🟢 (15ms)");
        log("--- Cycle complete ---\n");
      }, 6000);
    }

    window.onload = () => {
      log("📡 Monitor initialized in Forced Online Mode");
      log("All nodes are showing as ONLINE for demonstration.");
    };
  </script>
</body>
</html>
