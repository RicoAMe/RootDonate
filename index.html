<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Root Donate • Lost & Found</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@700&display=swap');
        
        body { font-family: 'Inter', system_ui, sans-serif; }
        .logo-font { font-family: 'Playfair Display', Georgia, serif; font-weight: 700; }

        .report-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .report-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.15);
        }

        .modal {
            animation: modalPop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        @keyframes modalPop {
            from { opacity: 0; transform: scale(0.95) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .filter-btn.active {
            background-color: #14b8a6;
            color: white;
            border-color: #14b8a6;
        }

        .line-clamp-3 {
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* Mobile improvements */
        @media (max-width: 640px) {
            .modal-content {
                margin: 16px;
                max-height: 94vh;
            }
        }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 min-h-screen">

    <!-- Navbar -->
    <nav class="bg-white dark:bg-slate-900 border-b border-slate-200 dark:border-slate-800 sticky top-0 z-50">
        <div class="max-w-screen-2xl mx-auto px-4 sm:px-6 py-4 flex items-center justify-between">
            <div class="flex items-center gap-x-3">
                <div class="w-9 h-9 bg-teal-600 rounded-2xl flex items-center justify-center text-white text-3xl">
                    <i class="fa-solid fa-handshake"></i>
                </div>
                <div>
                    <span class="logo-font text-3xl sm:text-4xl font-bold tracking-tighter">Root</span>
                    <span class="logo-font text-3xl sm:text-4xl font-bold tracking-tighter text-teal-600">Donate</span>
                </div>
            </div>

            <div class="flex items-center gap-x-4 sm:gap-x-6">
                <button onclick="toggleDarkMode()" class="w-10 h-10 flex items-center justify-center rounded-2xl hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
                    <i id="theme-icon" class="fa-solid fa-moon text-xl"></i>
                </button>

                <button onclick="showLoginModal()" id="login-btn"
                        class="px-5 py-2.5 text-sm font-medium rounded-3xl border border-slate-300 dark:border-slate-700 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
                    Log in
                </button>

                <button onclick="showNewReportModal()" id="new-report-btn"
                        class="hidden px-5 py-2.5 sm:px-6 sm:py-3 bg-teal-600 hover:bg-teal-700 text-white font-semibold rounded-3xl flex items-center gap-x-2 transition-colors text-sm sm:text-base">
                    <i class="fa-solid fa-plus"></i>
                    <span>New Report</span>
                </button>

                <div onclick="showUserMenu()" id="profile-section" 
                     class="hidden items-center gap-x-3 cursor-pointer hover:opacity-80 transition-opacity">
                    <img id="nav-avatar" class="w-9 h-9 rounded-2xl object-cover ring-2 ring-teal-200" src="https://i.pravatar.cc/128" alt="Profile">
                    <div class="hidden sm:block">
                        <div id="nav-name" class="font-semibold text-sm"></div>
                        <div id="nav-handle" class="text-teal-600 text-xs"></div>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="max-w-screen-2xl mx-auto px-4 sm:px-6 pt-8 pb-12">
        <h1 class="text-4xl sm:text-5xl md:text-6xl font-bold tracking-tighter text-center sm:text-left">Reuniting people with what matters.</h1>
        <p class="text-slate-600 dark:text-slate-400 mt-3 text-lg text-center sm:text-left">Lost &amp; Found • UK • Verified Accounts</p>

        <!-- Filters -->
        <div class="mt-8 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-3xl p-2 flex flex-col sm:flex-row gap-3">
            <div class="flex-1 relative">
                <i class="fa-solid fa-magnifying-glass absolute left-5 top-4 text-slate-400"></i>
                <input id="search-input" type="text" placeholder="Search reports, items, locations..." 
                       class="w-full pl-12 py-4 bg-slate-100 dark:bg-slate-800 rounded-3xl outline-none focus:ring-2 focus:ring-teal-500 transition-all"
                       onkeyup="if(event.key === 'Enter') filterReports()">
            </div>
            <div class="flex gap-2 flex-wrap">
                <button onclick="filterReports('all')" class="filter-btn active px-6 py-3 rounded-3xl text-sm font-medium">All</button>
                <button onclick="filterReports('lost')" class="filter-btn px-6 py-3 rounded-3xl text-sm font-medium">Lost</button>
                <button onclick="filterReports('found')" class="filter-btn px-6 py-3 rounded-3xl text-sm font-medium">Found</button>
                <button onclick="filterReports('money')" class="filter-btn px-6 py-3 rounded-3xl text-sm font-medium">💷 Money</button>
            </div>
        </div>

        <div id="reports-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 mt-8"></div>
    </div>

    <!-- New Report Modal -->
    <div id="new-report-modal" class="hidden fixed inset-0 bg-black/70 backdrop-blur-xl z-[200] flex items-center justify-center p-4">
        <div onclick="event.stopImmediatePropagation()" class="modal-content modal bg-white dark:bg-slate-900 w-full max-w-lg rounded-3xl p-6 sm:p-8 shadow-2xl max-h-[90vh] overflow-auto">
            <!-- ... same form as before (unchanged for brevity) ... -->
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-semibold">Create New Report</h2>
                <button onclick="closeNewReportModal()" class="text-4xl text-slate-400 hover:text-slate-600 dark:hover:text-slate-300">&times;</button>
            </div>

            <form id="new-report-form" onsubmit="submitNewReport(event)">
                <div class="space-y-5">
                    <!-- Type buttons, title, desc, location, category same as your original -->
                    <div>
                        <label class="block text-sm font-medium mb-2">Type</label>
                        <div class="flex gap-3">
                            <button type="button" onclick="selectType(this)" data-type="lost" class="type-btn flex-1 py-4 rounded-2xl border-2 border-rose-300 text-rose-700 dark:border-rose-800 font-semibold active">LOST</button>
                            <button type="button" onclick="selectType(this)" data-type="found" class="type-btn flex-1 py-4 rounded-2xl border-2 border-emerald-300 text-emerald-700 dark:border-emerald-800 font-semibold">FOUND</button>
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-medium mb-2">Title</label>
                        <input id="report-title" type="text" required class="w-full px-5 py-4 rounded-2xl border border-slate-300 dark:border-slate-700 focus:outline-none focus:border-teal-500" placeholder="e.g. Black leather wallet with cash">
                    </div>

                    <div>
                        <label class="block text-sm font-medium mb-2">Description</label>
                        <textarea id="report-desc" rows="4" required class="w-full px-5 py-4 rounded-2xl border border-slate-300 dark:border-slate-700 focus:outline-none focus:border-teal-500" placeholder="Details about the item..."></textarea>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium mb-2">Location</label>
                            <input id="report-location" type="text" required class="w-full px-5 py-4 rounded-2xl border border-slate-300 dark:border-slate-700 focus:outline-none focus:border-teal-500" placeholder="Oxford Street, London">
                        </div>
                        <div>
                            <label class="block text-sm font-medium mb-2">Category</label>
                            <select id="report-category" required class="w-full px-5 py-4 rounded-2xl border border-slate-300 dark:border-slate-700 focus:outline-none focus:border-teal-500">
                                <option value="item">General Item</option>
                                <option value="money">Money / Wallet</option>
                                <option value="phone">Phone / Electronics</option>
                                <option value="bag">Bag / Backpack</option>
                                <option value="other">Other</option>
                            </select>
                        </div>
                    </div>

                    <button type="submit" class="w-full py-4 bg-teal-600 hover:bg-teal-700 text-white font-semibold rounded-3xl transition-colors">Post Report</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Auth Modal (unchanged) -->
    <!-- ... your original auth modal ... -->

    <!-- Report Detail Modal -->
    <div id="detail-modal" class="hidden fixed inset-0 bg-black/70 backdrop-blur-xl z-[200] flex items-center justify-center p-4">
        <div onclick="event.stopImmediatePropagation()" 
             class="modal-content modal bg-white dark:bg-slate-900 w-full max-w-2xl rounded-3xl p-6 sm:p-8 shadow-2xl max-h-[90vh] overflow-auto">
            <button onclick="closeDetailModal()" class="float-right text-4xl text-slate-400 hover:text-slate-600">&times;</button>
            
            <div id="detail-content" class="mt-8"></div>
            
            <div class="mt-8 flex flex-col sm:flex-row gap-3">
                <button onclick="copyShareLink()" 
                        class="flex-1 py-3.5 border border-slate-300 dark:border-slate-700 rounded-3xl font-medium flex items-center justify-center gap-2 hover:bg-slate-50 dark:hover:bg-slate-800">
                    <i class="fa-solid fa-link"></i>
                    Copy Share Link
                </button>
                <button onclick="closeDetailModal()" 
                        class="flex-1 py-3.5 bg-teal-600 text-white rounded-3xl font-medium">Close</button>
            </div>
        </div>
    </div>

    <script>
        let reports = [];
        let currentUser = null;
        let selectedType = 'lost';
        let currentDetailId = null;

        function loadSampleData() {
            reports = [
                { id: 1, type: "lost", category: "money", title: "Black Leather Wallet", description: "Lost near Covent Garden. Contains ID, cards and some cash. Reward offered.", location: "Covent Garden, London", date: "2025-06-24", account: "@sarah_k" },
                { id: 2, type: "found", category: "phone", title: "iPhone 15 Pro - Blue", description: "Found on the Northern Line. Battery at 23%. Still locked.", location: "Northern Line, London", date: "2025-06-25", account: "@londoncommuter" },
            ];
        }

        function loadData() {
            const saved = localStorage.getItem('reports');
            if (saved) reports = JSON.parse(saved);
            else loadSampleData();

            const savedUser = localStorage.getItem('currentUser');
            if (savedUser) {
                currentUser = JSON.parse(savedUser);
                updateUIForLoggedInUser();
            }
        }

        function saveData() {
            localStorage.setItem('reports', JSON.stringify(reports));
        }

        function renderReports(filtered = reports) {
            const grid = document.getElementById('reports-grid');
            grid.innerHTML = '';

            filtered.forEach(report => {
                const card = document.createElement('div');
                card.className = `report-card bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-3xl p-6 cursor-pointer`;
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-4">
                        <span class="px-3 py-1 text-xs font-medium rounded-full ${report.type === 'lost' ? 'bg-rose-100 text-rose-700 dark:bg-rose-900 dark:text-rose-300' : 'bg-emerald-100 text-emerald-700 dark:bg-emerald-900 dark:text-emerald-300'}">
                            ${report.type.toUpperCase()}
                        </span>
                        <span class="text-xs text-slate-500">${report.date}</span>
                    </div>
                    <h3 class="font-semibold text-lg mb-2">${report.title}</h3>
                    <p class="text-slate-600 dark:text-slate-400 text-sm line-clamp-3 mb-4">${report.description}</p>
                    <div class="flex items-center justify-between text-sm">
                        <div class="flex items-center gap-2">
                            <i class="fa-solid fa-location-dot text-teal-500"></i>
                            <span>${report.location}</span>
                        </div>
                        <div class="text-teal-600 text-xs font-medium">${report.account}</div>
                    </div>
                `;
                card.onclick = () => showDetailModal(report.id);
                grid.appendChild(card);
            });
        }

        function filterReports(type = 'all') {
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            const activeBtn = Array.from(document.querySelectorAll('.filter-btn')).find(btn => 
                btn.getAttribute('onclick').includes(`'${type}'`));
            if (activeBtn) activeBtn.classList.add('active');

            let filtered = reports;
            if (type === 'lost') filtered = reports.filter(r => r.type === 'lost');
            if (type === 'found') filtered = reports.filter(r => r.type === 'found');
            if (type === 'money') filtered = reports.filter(r => r.category === 'money');

            const search = document.getElementById('search-input').value.toLowerCase().trim();
            if (search) {
                filtered = filtered.filter(r => 
                    r.title.toLowerCase().includes(search) ||
                    r.description.toLowerCase().includes(search) ||
                    r.location.toLowerCase().includes(search)
                );
            }
            renderReports(filtered);
        }

        // Share Link System
        function getShareUrl(id) {
            return `${window.location.origin}${window.location.pathname}#report/${id}`;
        }

        function copyShareLink() {
            if (!currentDetailId) return;
            const url = getShareUrl(currentDetailId);
            navigator.clipboard.writeText(url).then(() => {
                showToast("✅ Share link copied!");
            });
        }

        function showDetailModal(id) {
            const report = reports.find(r => r.id === id);
            if (!report) return;

            currentDetailId = id;
            window.location.hash = `report/${id}`;

            const html = `
                <div class="flex justify-between items-center">
                    <span class="px-4 py-1 text-sm font-medium rounded-full ${report.type === 'lost' ? 'bg-rose-100 text-rose-700' : 'bg-emerald-100 text-emerald-700'}">
                        ${report.type.toUpperCase()}
                    </span>
                    <span class="text-sm text-slate-500">${report.date}</span>
                </div>
                <h2 class="text-3xl font-semibold mt-4 mb-3">${report.title}</h2>
                <p class="text-slate-600 dark:text-slate-400">${report.description}</p>
                <div class="mt-6 flex items-center gap-4 text-sm">
                    <div><i class="fa-solid fa-location-dot text-teal-500"></i> ${report.location}</div>
                    <div>Posted by <span class="text-teal-600">${report.account}</span></div>
                </div>
            `;

            document.getElementById('detail-content').innerHTML = html;
            document.getElementById('detail-modal').classList.remove('hidden');
            document.getElementById('detail-modal').classList.add('flex');
        }

        function closeDetailModal() {
            const modal = document.getElementById('detail-modal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
            window.location.hash = '';
        }

        // Handle direct links / browser back button
        function handleHashChange() {
            const hash = window.location.hash;
            if (hash.startsWith('#report/')) {
                const id = parseInt(hash.split('/')[1]);
                if (id) showDetailModal(id);
            }
        }

        // Rest of your functions (showNewReportModal, login, register, etc.) remain the same
        // ... (I kept them identical to your original for brevity)

        window.onload = () => {
            loadData();
            renderReports();
            handleHashChange();
            window.addEventListener('hashchange', handleHashChange);

            console.log('%c✅ Root Donate ready • Mobile + Perfect Share Links', 'color:#14b8a6; font-weight:600; font-size:13px');
        };
    </script>
</body>
</html>
