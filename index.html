<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Node Monitor - Clean Online</title>
  <style>
    :root { --green: #00ff41; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #050505;
      color: var(--green);
      margin: 0;
      padding: 20px;
    }
    .container { max-width: 1000px; margin: auto; }
    h1 { text-align: center; font-size: 2.4em; margin-bottom: 10px; }
    p.subtitle { text-align: center; color: #666; }
    .node {
      background: #0f0f0f;
      padding: 20px;
      margin: 20px 0;
      border-radius: 12px;
      border: 2px solid var(--green);
    }
    input {
      width: 100%;
      padding: 14px;
      font-size: 17px;
      background: #1a1a1a;
      color: var(--green);
      border: 1px solid #333;
      border-radius: 8px;
    }
    .controls { text-align: center; margin: 30px 0; }
    button {
      padding: 15px 32px;
      font-size: 17px;
      margin: 0 10px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
    .start-btn { background: var(--green); color: black; font-weight: bold; }
    .stop-btn { background: #ff2d2d; color: white; }
    .log {
      background: #000;
      padding: 20px;
      height: 480px;
      overflow-y: auto;
      font-family: monospace;
      border: 2px solid var(--green);
      border-radius: 12px;
      line-height: 1.6;
    }
    .online { color: lime; font-weight: bold; }
    .offline { color: #ff6666; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔄 NODE MONITOR</h1>
    <p class="subtitle">CWOA • HarrisFed • Colossus | Auto Scan</p>

    <div class="node">
      <h2>1. @CWOA</h2>
      <input type="text" id="cwoa" value="192.168.0.1">
    </div>
    <div class="node">
      <h2>2. @HarrisFed</h2>
      <input type="text" id="harrisfed" value="192.168.0.1">
    </div>
    <div class="node">
      <h2>3. Colossus</h2>
      <input type="text" id="colossus" value="192.168.0.1">
    </div>

    <div class="controls">
      <button class="start-btn" onclick="startScan()">▶ START AUTO SCAN</button>
      <button class="stop-btn" onclick="stopScan()">⛔ STOP</button>
    </div>

    <h2 style="text-align:center;">Live Status Log</h2>
    <div id="log" class="log"></div>
  </div>

  <script>
    let interval = null;

    function log(text) {
      const time = new Date().toLocaleTimeString();
      document.getElementById("log").innerHTML += `<span style="color:#555">[${time}]</span> ${text}<br>`;
      document.getElementById("log").scrollTop = 1e6;
    }

    async function check(host, name) {
      if (!host) return log(`${name} → <span class="offline">OFFLINE (No IP)</span>`);

      log(`Checking ${name} (${host})...`);

      try {
        // Best effort detection
        await Promise.race([
          fetch(`http://${host}`, {mode: 'no-cors', cache: 'no-store'}),
          new Promise(resolve => setTimeout(() => resolve(false), 4000))
        ]);
        log(`${name} → <span class="online">ONLINE 🟢</span>`);
      } catch (e) {
        log(`${name} → <span class="offline">OFFLINE 🔴</span>`);
      }
    }

    async function runScan() {
      await check(document.getElementById("cwoa").value.trim(), "@CWOA");
      await check(document.getElementById("harrisfed").value.trim(), "@HarrisFed");
      await check(document.getElementById("colossus").value.trim(), "Colossus");
      log("✅ Scan cycle completed — next scan in 8 seconds\n");
    }

    function startScan() {
      if (interval) clearInterval(interval);
      log("<strong>🚀 Auto Scan Started</strong>");
      runScan();
      interval = setInterval(runScan, 8000);
    }

    function stopScan() {
      if (interval) clearInterval(interval);
      interval = null;
      log("<strong>⛔ Scan Stopped</strong>");
    }

    // Auto start
    window.onload = () => {
      log("📡 Monitor ready. Click START AUTO SCAN");
    };
  </script>
</body>
</html>
