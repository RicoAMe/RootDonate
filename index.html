<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Node Monitor - All Online</title>
  <style>
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #0a0a0a;
      color: #00ff00;
      margin: 0;
      padding: 20px;
    }
    .container {
      max-width: 1100px;
      margin: auto;
    }
    h1 {
      text-align: center;
      font-size: 2.5em;
      margin-bottom: 10px;
    }
    .subtitle {
      text-align: center;
      color: #0f0;
      font-size: 1.2em;
      margin-bottom: 30px;
    }
    .node {
      background: #111111;
      padding: 25px;
      margin: 20px 0;
      border-radius: 12px;
      border: 2px solid #00ff00;
      box-shadow: 0 0 15px rgba(0, 255, 0, 0.2);
    }
    .status {
      font-size: 1.5em;
      font-weight: bold;
      color: lime;
    }
    button {
      background: #00ff00;
      color: black;
      padding: 14px 32px;
      font-size: 17px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      margin: 0 10px;
    }
    .log {
      background: #000;
      padding: 20px;
      height: 420px;
      overflow-y: auto;
      font-family: monospace;
      border: 1px solid #00ff00;
      border-radius: 10px;
      margin-top: 30px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔄 NODE MONITOR</h1>
    <p class="subtitle">✅ All Nodes Online</p>

    <div class="node">
      <h2>Node 1: @CWOA</h2>
      <div class="status">🟢 ONLINE • 192.168.0.1</div>
    </div>

    <div class="node">
      <h2>Node 2: @HarrisFed</h2>
      <div class="status">🟢 ONLINE • 192.168.0.1</div>
    </div>

    <div class="node">
      <h2>Node 3: Colossus</h2>
      <div class="status">🟢 ONLINE • 192.168.0.1</div>
    </div>

    <div style="text-align: center; margin: 30px 0;">
      <button onclick="startAutoLog()">▶ Start Auto Refresh</button>
    </div>

    <h2 style="text-align:center;">Live Activity Log</h2>
    <div id="log" class="log"></div>
  </div>

  <script>
    function log(message) {
      const time = new Date().toLocaleTimeString();
      document.getElementById("log").innerHTML += `[${time}] ${message}<br>`;
      document.getElementById("log").scrollTop = 999999;
    }

    function startAutoLog() {
      log("🚀 Auto monitoring started - All nodes ONLINE");
      setInterval(() => {
        log("✅ @CWOA → ONLINE (8ms) 🟢");
        log("✅ @HarrisFed → ONLINE (12ms) 🟢");
        log("✅ Colossus → ONLINE (6ms) 🟢");
        log("--- Scan cycle complete ---\n");
      }, 7000);
    }

    // Auto start
    window.onload = () => {
      log("📡 System initialized");
      log("All device nodes are showing as ONLINE");
      setTimeout(startAutoLog, 800);
    };
  </script>
</body>
</html>
