<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Node Monitor • Live Online</title>
  <style>
    :root { --primary: #00ff00; --bg: #0a0a0a; --card: #111; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: var(--bg);
      color: var(--primary);
      margin: 0; padding: 20px;
    }
    .container { max-width: 1100px; margin: auto; }
    h1 { text-align: center; font-size: 2.3em; margin-bottom: 5px; }
    .subtitle { text-align: center; color: #888; margin-bottom: 30px; }
    .node {
      background: var(--card);
      padding: 18px;
      margin: 18px 0;
      border-radius: 10px;
      border: 1px solid var(--primary);
    }
    input {
      width: 100%; padding: 12px; font-size: 16px;
      background: #1a1a1a; color: var(--primary);
      border: 1px solid #333; border-radius: 6px;
    }
    .controls { text-align: center; margin: 25px 0; }
    button {
      padding: 14px 28px; font-size: 16px; border: none;
      border-radius: 6px; cursor: pointer; margin: 0 8px;
    }
    .start-btn { background: var(--primary); color: black; font-weight: bold; }
    .stop-btn { background: #ff3333; color: white; }
    .log {
      background: #000; padding: 20px; height: 520px;
      overflow-y: auto; font-family: monospace; font-size: 14px;
      border: 1px solid var(--primary); border-radius: 10px;
    }
    .online { color: lime; }
    .offline { color: red; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔴 LIVE NODE MONITOR</h1>
    <p class="subtitle">CWOA • HarrisFed • Colossus | Auto Online Detection</p>

    <div class="node"><h2>Node 1: @CWOA</h2><input type="text" id="cwoa" value="192.168.0.1"></div>
    <div class="node"><h2>Node 2: @HarrisFed</h2><input type="text" id="harrisfed" value="192.168.0.1"></div>
    <div class="node"><h2>Node 3: Colossus</h2><input type="text" id="colossus" value="192.168.0.1"></div>

    <div class="controls">
      <button class="start-btn" onclick="startScan()">▶ Start Auto Scan</button>
      <button class="stop-btn" onclick="stopScan()">⛔ Stop</button>
    </div>

    <h2 style="text-align:center;">Live Log</h2>
    <div id="log" class="log"></div>
  </div>

  <script>
    let interval = null;

    function log(msg, status="") {
      const logDiv = document.getElementById("log");
      const time = new Date().toLocaleTimeString();
      logDiv.innerHTML += `<span style="color:#666">[${time}]</span> ${msg} ${status}<br>`;
      logDiv.scrollTop = logDiv.scrollHeight;
    }

    async function isOnline(host) {
      if (!host) return {status: "offline", time: 0};
      
      try {
        const controller = new AbortController();
        const timeout = setTimeout(() => controller.abort(), 5000);

        const response = await fetch(`http://${host}`, {
          mode: 'no-cors',
          signal: controller.signal,
          cache: 'no-cache'
        });
        
        clearTimeout(timeout);
        return {status: "online", time: "✓"};
      } catch (e) {
        return {status: "offline", time: "✕"};
      }
    }

    async function runScan() {
      const nodes = [
        {name: "CWOA", ip: document.getElementById("cwoa").value.trim()},
        {name: "HarrisFed", ip: document.getElementById("harrisfed").value.trim()},
        {name: "Colossus", ip: document.getElementById("colossus").value.trim()}
      ];

      for (let node of nodes) {
        log(`Checking <strong>${node.name}</strong> (${node.ip})...`);
        const res = await isOnline(node.ip);
        const colorClass = res.status === "online" ? "online" : "offline";
        log(`${node.name} → <span class="${colorClass}"><strong>${res.status.toUpperCase()}</strong></span>`, res.status === "online" ? "🟢" : "🔴");
      }

      log("✅ Scan cycle finished — next in 8 seconds...\n");
    }

    function startScan() {
      if (interval) clearInterval(interval);
      log("🚀 Auto scan activated — checking nodes...");
      runScan();
      interval = setInterval(runScan, 8000);
    }

    function stopScan() {
      if (interval) clearInterval(interval);
      interval = null;
      log("⛔ Auto scan stopped.");
    }

    // Auto start
    window.onload = () => {
      log("📡 System initialized with 192.168.0.1");
      setTimeout(startScan, 1500);
    };
  </script>
</body>
</html>
