<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Device Node Scanner - CWOA & HarrisFed</title>
  <style>
    body { font-family: Arial, sans-serif; background: #0f0f0f; color: #0f0; margin: 0; padding: 20px; }
    h1 { text-align: center; color: #0f0; }
    .container { max-width: 900px; margin: auto; }
    .node { background: #1a1a1a; padding: 15px; margin: 15px 0; border-radius: 8px; border: 1px solid #0f0; }
    button { background: #0f0; color: black; padding: 12px 20px; border: none; border-radius: 5px; font-size: 16px; cursor: pointer; }
    button:hover { background: #00cc00; }
    .log { background: black; padding: 15px; height: 400px; overflow-y: auto; font-family: monospace; white-space: pre-wrap; border: 1px solid #0f0; }
    .status { font-weight: bold; }
    .online { color: lime; }
    .offline { color: red; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔍 Device Node Scanner</h1>
    <p style="text-align:center;">Monitoring: <strong>@CWOA</strong> &amp; <strong>@HarrisFed</strong> → Your Device</p>

    <div class="node">
      <h2>Node 1: @CWOA</h2>
      <p>IP / Host: <input type="text" id="cwoa" placeholder="Enter CWOA IP or hostname" style="width:80%; padding:8px;"></p>
    </div>

    <div class="node">
      <h2>Node 2: @HarrisFed</h2>
      <p>IP / Host: <input type="text" id="harrisfed" placeholder="Enter HarrisFed IP or hostname" style="width:80%; padding:8px;"></p>
    </div>

    <button onclick="startScan()">▶ Start Persistent Scan</button>
    <button onclick="stopScan()" style="background:#f44; margin-left:10px;">⛔ Stop Scan</button>

    <h2>Live Log</h2>
    <div id="log" class="log"></div>
  </div>

  <script>
    let interval = null;

    function log(message, status = "") {
      const logDiv = document.getElementById("log");
      const time = new Date().toLocaleTimeString();
      logDiv.innerHTML += `[${time}] ${message} ${status}<br>`;
      logDiv.scrollTop = logDiv.scrollHeight;
    }

    function ping(host) {
      return new Promise(resolve => {
        const start = Date.now();
        // Simple browser-based check using Image or fetch (limited but works for reachability)
        const img = new Image();
        img.onload = () => resolve({host, time: Date.now() - start, status: "online"});
        img.onerror = () => resolve({host, time: 9999, status: "offline"});
        img.src = `http://${host}/favicon.ico?${start}`;
        setTimeout(() => resolve({host, time: 9999, status: "offline"}), 5000);
      });
    }

    async function runScan() {
      const cwoa = document.getElementById("cwoa").value.trim() || "CWOA-IP";
      const harrisfed = document.getElementById("harrisfed").value.trim() || "HarrisFed-IP";

      log("Scanning CWOA...", "");
      const cwoaResult = await ping(cwoa);
      log(`CWOA → ${cwoaResult.status.toUpperCase()} (${cwoaResult.time}ms)`, 
          cwoaResult.status === "online" ? "🟢" : "🔴");

      log("Scanning HarrisFed...", "");
      const harrisResult = await ping(harrisfed);
      log(`HarrisFed → ${harrisResult.status.toUpperCase()} (${harrisResult.time}ms)`, 
          harrisResult.status === "online" ? "🟢" : "🔴");

      log("--- Scan cycle complete — waiting 10s ---\n", "");
    }

    function startScan() {
      if (interval) clearInterval(interval);
      log("🚀 Persistent scan started (every 10 seconds)...");
      runScan(); // first run immediately
      interval = setInterval(runScan, 10000);
    }

    function stopScan() {
      if (interval) {
        clearInterval(interval);
        interval = null;
      }
      log("⛔ Scan stopped.");
    }

    // Auto example on load
    window.onload = () => {
      log("Page loaded. Enter IPs above and click Start.");
    };
  </script>
</body>
</html>
