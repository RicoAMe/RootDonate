<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Node Monitor - Python Style</title>
  <style>
    body {
      font-family: 'Courier New', monospace;
      background: #000;
      color: #00ff00;
      margin: 0;
      padding: 20px;
      line-height: 1.5;
    }
    .container { max-width: 900px; margin: auto; }
    h1 { text-align: center; color: #00ff41; }
    .header { text-align: center; color: #666; margin-bottom: 20px; }
    .log {
      background: #0a0a0a;
      padding: 20px;
      border: 1px solid #00ff00;
      border-radius: 8px;
      height: 560px;
      overflow-y: auto;
      white-space: pre-wrap;
    }
    button {
      padding: 12px 30px;
      font-size: 16px;
      margin: 10px;
      background: #00ff00;
      color: black;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
    }
    .stop { background: #ff4444; color: white; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🚀 MULTI-NODE MONITOR</h1>
    <p class="header">CWOA • HarrisFed • Colossus | Auto Running</p>

    <div style="text-align:center;">
      <button onclick="startMonitor()">▶ START MONITOR</button>
      <button class="stop" onclick="stopMonitor()">⛔ STOP</button>
    </div>

    <div id="log" class="log"></div>
  </div>

  <script>
    let interval = null;

    function printLine(text) {
      const log = document.getElementById("log");
      const time = new Date().toLocaleTimeString();
      log.innerHTML += `[${time}] ${text}\n`;
      log.scrollTop = log.scrollHeight;
    }

    async function checkNode(name, ip) {
      printLine(`Checking ${name.padEnd(12)} → ${ip.padEnd(15)} ...`);
      
      // Best possible browser detection
      try {
        await Promise.race([
          fetch(`http://${ip}`, { mode: 'no-cors', cache: 'no-store' }),
          new Promise(r => setTimeout(() => r(false), 3500))
        ]);
        printLine(`✅ ${name.padEnd(12)} → ONLINE 🟢`);
      } catch (e) {
        printLine(`❌ ${name.padEnd(12)} → OFFLINE 🔴`);
      }
    }

    async function scanAll() {
      printLine("=".repeat(60));
      printLine(`SCAN STARTED AT ${new Date().toLocaleString()}`);
      printLine("=".repeat(60));

      await checkNode("CWOA", document.getElementById("cwoa") ? document.getElementById("cwoa").value : "192.168.0.1");
      await checkNode("HarrisFed", document.getElementById("harrisfed") ? document.getElementById("harrisfed").value : "192.168.0.1");
      await checkNode("Colossus", document.getElementById("colossus") ? document.getElementById("colossus").value : "192.168.0.1");

      printLine("Cycle complete. Waiting 8 seconds...\n");
    }

    function startMonitor() {
      if (interval) clearInterval(interval);
      printLine("🚀 MONITOR STARTED - Running continuously");
      scanAll();
      interval = setInterval(scanAll, 8000);
    }

    function stopMonitor() {
      if (interval) {
        clearInterval(interval);
        interval = null;
      }
      printLine("⛔ MONITOR STOPPED BY USER");
    }

    // Auto start
    window.onload = () => {
      printLine("System initialized with default IP 192.168.0.1");
      setTimeout(startMonitor, 1000);
    };
  </script>
</body>
</html>
