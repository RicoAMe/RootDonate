<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Auto Device Scanner - CWOA & HarrisFed</title>
  <style>
    body { font-family: Arial, sans-serif; background: #0f0f0f; color: #0f0; margin: 0; padding: 20px; }
    h1 { text-align: center; color: #0f0; }
    .container { max-width: 900px; margin: auto; }
    .node { background: #1a1a1a; padding: 15px; margin: 15px 0; border-radius: 8px; border: 1px solid #0f0; }
    button { background: #0f0; color: black; padding: 12px 20px; border: none; border-radius: 5px; font-size: 16px; cursor: pointer; margin: 5px; }
    button:hover { background: #00cc00; }
    .stop-btn { background: #f44; }
    .log { background: black; padding: 15px; height: 500px; overflow-y: auto; font-family: monospace; white-space: pre-wrap; border: 1px solid #0f0; }
    .status { font-weight: bold; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔄 Auto Device Node Scanner</h1>
    <p style="text-align:center;">Monitoring: <strong>@CWOA</strong> &amp; <strong>@HarrisFed</strong> → Your Device<br>
    <small>Auto-starts on load • Scans every 8 seconds</small></p>

    <div class="node">
      <h2>Node 1: @CWOA</h2>
      <input type="text" id="cwoa" placeholder="Enter CWOA IP or hostname" style="width:100%; padding:10px; font-size:16px;">
    </div>

    <div class="node">
      <h2>Node 2: @HarrisFed</h2>
      <input type="text" id="harrisfed" placeholder="Enter HarrisFed IP or hostname" style="width:100%; padding:10px; font-size:16px;">
    </div>

    <button onclick="startScan()">▶ Restart Scan</button>
    <button onclick="stopScan()" class="stop-btn">⛔ Stop Scan</button>

    <h2>Live Log</h2>
    <div id="log" class="log"></div>
  </div>

  <script>
    let interval = null;

    function log(message, status = "") {
      const logDiv = document.getElementById("log");
      const time = new Date().toLocaleTimeString();
      logDiv.innerHTML += `[${time}] ${message} ${status}<br>`;
      logDiv.scrollTop = logDiv.scrollHeight;
    }

    async function ping(host) {
      return new Promise(resolve => {
        if (!host || host === "") {
          resolve({host: "unknown", time: 0, status: "offline"});
          return;
        }
        const start = Date.now();
        const img = new Image();
        img.onload = () => resolve({host, time: Date.now() - start, status: "online"});
        img.onerror = () => resolve({host, time: 9999, status: "offline"});
        img.src = `http://${host}/favicon.ico?${start}`;
        setTimeout(() => resolve({host, time: 9999, status: "offline"}), 6000);
      });
    }

    async function runScan() {
      const cwoa = document.getElementById("cwoa").value.trim() || "CWOA-IP";
      const harrisfed = document.getElementById("harrisfed").value.trim() || "HarrisFed-IP";

      log("🔍 Scanning CWOA...", "");
      const cResult = await ping(cwoa);
      log(`CWOA → ${cResult.status.toUpperCase()} (${cResult.time}ms)`, cResult.status === "online" ? "🟢" : "🔴");

      log("🔍 Scanning HarrisFed...", "");
      const hResult = await ping(harrisfed);
      log(`HarrisFed → ${hResult.status.toUpperCase()} (${hResult.time}ms)`, hResult.status === "online" ? "🟢" : "🔴");

      log("✅ Cycle complete — next scan in 8 seconds...\n", "");
    }

    function startScan() {
      if (interval) clearInterval(interval);
      log("🚀 Auto persistent scan started...");
      runScan();
      interval = setInterval(runScan, 8000);   // every 8 seconds
    }

    function stopScan() {
      if (interval) {
        clearInterval(interval);
        interval = null;
      }
      log("⛔ Scan stopped by user.");
    }

    // AUTO START when page loads
    window.onload = () => {
      log("📡 Page loaded — Auto scan will begin in 2 seconds...");
      setTimeout(startScan, 2000);
    };
  </script>
</body>
</html>
